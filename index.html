<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100%; 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            color: #333; overflow-x: hidden;
            background: linear-gradient(-45deg, #ffcce0, #ffe6f0, #ffb3d1, #ffd6e8); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .screen { display: none; opacity: 0; transition: opacity 0.6s ease; width: 100%; }
        .screen.active { display: flex; opacity: 1; }
        
        /* الصناديق بتأثير زجاجي حديث */
        .glass-box { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 20px; padding: 40px; 
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2); 
            text-align: center; max-width: 400px; width: 90%; 
        }
        
        h2 { color: #ff1493; margin-bottom: 20px; font-size: 26px; }
        input[type="password"] { 
            padding: 15px; margin: 15px 0; border: 2px solid #ffb6c1; 
            border-radius: 10px; text-align: center; font-size: 18px; 
            width: 80%; outline: none; background: rgba(255,255,255,0.9);
        }
        button { 
            background-color: #ff1493; color: white; border: none; 
            padding: 12px 30px; border-radius: 25px; font-size: 18px; 
            cursor: pointer; font-weight: bold; transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 20, 147, 0.4); }
        
        /* إشعار الخطأ */
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background-color: #fff; border-right: 5px solid #ff4d6d; 
            padding: 15px 25px; border-radius: 8px; font-weight: bold; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1000; color: #ff4d6d; 
        }
        #toast.show { top: 30px; }

        /* العداد الزمني */
        #counter-container { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; direction: rtl; }
        .time-box { 
            background: rgba(255, 20, 147, 0.1); border-radius: 10px; 
            padding: 10px 15px; min-width: 60px; text-align: center; 
            color: #ff1493; font-weight: bold; font-size: 20px; 
            border: 1px solid rgba(255, 20, 147, 0.2);
        }
        .time-box span { display: block; font-size: 12px; color: #666; margin-top: 5px; }

        /* النصوص */
        .typewriter-text { font-size: 18px; line-height: 1.8; color: #444; min-height: 120px; text-align: justify; }
        
        /* البطاقات والصور (إصلاح الأبعاد) */
        .cards-grid { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px 0; width: 100%; }
        .card { 
            background: white; border-radius: 20px; padding: 15px; 
            width: 90%; max-width: 400px; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(255,105,180,0.2); }
        .card img { 
            width: 100%; height: 280px; object-fit: cover; /* هذا يمنع تشوه الصورة */
            border-radius: 15px; 
        }
        .card p { font-weight: bold; color: #ff1493; margin-top: 15px; font-size: 16px; }

        /* زر الرسالة الختامية */
        .final-btn { background: #fff; color: #ff1493; border: 2px solid #ff1493; margin-top: 20px; }
        .final-btn:hover { background: #ff1493; color: #fff; }

        /* العرض المكبر للصور */
        .lightbox { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; justify-content: center; 
            align-items: center; z-index: 2000; opacity: 0; transition: 0.3s; 
        }
        .lightbox img { max-width: 95%; max-height: 90%; border-radius: 10px; object-fit: contain; }
    </style>
</head>
<body>
    <div id="toast">⚠️ عذراً، كلمة المرور غير صحيحة!</div>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="container screen active">
        <div class="glass-box">
            <h2>تسجيل الدخول</h2>
            <input type="password" id="passInput" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter') checkPass()">
            <br>
            <button onclick="checkPass()">دخول</button>
        </div>
    </div>

    <!-- الشاشة الافتتاحية -->
    <div id="introScreen" class="container screen">
        <div class="glass-box" style="max-width: 600px;">
            <div id="counter-container">
                <div class="time-box" id="d-box">0<span>يوم</span></div>
                <div class="time-box" id="h-box">0<span>ساعة</span></div>
                <div class="time-box" id="m-box">0<span>دقيقة</span></div>
                <div class="time-box" id="s-box">0<span>ثانية</span></div>
            </div>
            <p id="introText" class="typewriter-text"></p>
            <button id="nextBtn" style="margin-top: 20px; display: none;" onclick="switchScreen('introScreen', 'cardsScreen')">المضي قدماً ✨</button>
        </div>
    </div>

    <!-- شاشة الصور -->
    <div id="cardsScreen" class="screen">
        <div class="cards-grid">
            <div class="card" onclick="openLightbox('https://i.postimg.cc/p9Ynn2qJ/1.jpg')"><img src="https://i.postimg.cc/p9Ynn2qJ/1.jpg" alt="Memory 1"><p>من هنا بدأت حكايتنا 💖</p></div>
            <div class="card" onclick="openLightbox('https://i.postimg.cc/mcNFFb8j/2.jpg')"><img src="https://i.postimg.cc/mcNFFb8j/2.jpg" alt="Memory 2"><p>لما عرفت إن الشعور متبادل 💕</p></div>
            <div class="card" onclick="openLightbox('https://i.postimg.cc/Vrf0q3hc/3.jpg')"><img src="https://i.postimg.cc/Vrf0q3hc/3.jpg" alt="Memory 3"><p>أجمل حروف انكتبت لي 💖</p></div>
            <div class="card" onclick="openLightbox('https://i.postimg.cc/wyqRXSGN/4.jpg')"><img src="https://i.postimg.cc/wyqRXSGN/4.jpg" alt="Memory 4"><p>وعودنا اللي مستحيل تنكسر ❤️</p></div>
            <div class="card" onclick="openLightbox('https://i.postimg.cc/xJ6Jt6rc/5.jpg')"><img src="https://i.postimg.cc/xJ6Jt6rc/5.jpg" alt="Memory 5"><p>ضحكاتنا اللي تحلي أيامي 😂</p></div>
            
            <button class="final-btn" onclick="startFinalMessage()">رسالة إلى الغد 🤍</button>
        </div>
    </div>

    <!-- شاشة الرسالة الختامية -->
    <div id="finalScreen" class="container screen">
        <div class="glass-box" style="max-width: 600px;">
            <p id="finalText" class="typewriter-text" style="font-weight: bold; color: #ff1493;"></p>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="">
    </div>

    <script>
        const introMessage = "هناك لحظات تفصل حياتنا إلى ما قبل وما بعد، ووجودكِ يا ورد هو هذا الفاصل. لم يكن الأمر مجرد صدفة، بل كان أشبه بإيجاد المنطق في عالم فوضوي. كل ثانية نقضيها معاً ليست مجرد وقت يمر، بل هي إثبات لصدق ما بيننا. أنتِ نقطة الارتكاز التي يعتدل بها توازني، والواقع الذي أختاره كل يوم.";
        const finalMessage = "بين كل هذه الصور والذكريات، هناك حقيقة واحدة ثابتة؛ أنا هنا لأجلكِ، في كل ثانية قادمة كما كنت في كل ثانية مضت. مهما تغيرت الأيام وتراكمت التفاصيل، مكانكِ في قلبي محمي بيقين لا يمسه شك. كوني بخير دائماً، لأنكِ بكل بساطة.. واقعي الأجمل. أحبكِ جداً ❤️";

        function switchScreen(hideId, showId) {
            const hide = document.getElementById(hideId);
            const show = document.getElementById(showId);
            hide.style.opacity = "0";
            setTimeout(() => {
                hide.classList.remove("active");
                show.classList.add("active");
                window.scrollTo({ top: 0 });
                setTimeout(() => show.style.opacity = "1", 50);
            }, 500);
        }

        function checkPass() {
            if (document.getElementById("passInput").value === "20081017") {
                switchScreen("loginScreen", "introScreen");
                startCounter();
                setTimeout(() => typeEffect("introText", introMessage, 0, () => {
                    document.getElementById("nextBtn").style.display = "inline-block";
                }), 600);
            } else {
                const t = document.getElementById("toast");
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 3000);
            }
        }

        function typeEffect(elementId, text, index, callback) {
            if (index === 0) document.getElementById(elementId).innerHTML = "";
            if (index < text.length) {
                document.getElementById(elementId).innerHTML += text.charAt(index);
                setTimeout(() => typeEffect(elementId, text, index + 1, callback), 45);
            } else if (callback) {
                callback();
            }
        }

        function startCounter() {
            setInterval(() => {
                const now = new Date();
                const start = new Date("2026-05-23T17:00:00");
                const diff = Math.max(0, now - start);
                
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                
                document.getElementById("d-box").innerHTML = d + "<span>يوم</span>";
                document.getElementById("h-box").innerHTML = h + "<span>ساعة</span>";
                document.getElementById("m-box").innerHTML = m + "<span>دقيقة</span>";
                document.getElementById("s-box").innerHTML = s + "<span>ثانية</span>";
            }, 1000);
        }

        function startFinalMessage() {
            switchScreen("cardsScreen", "finalScreen");
            setTimeout(() => typeEffect("finalText", finalMessage, 0), 800);
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = src;
            lb.style.display = 'flex';
            setTimeout(() => lb.style.opacity = '1', 10);
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.style.opacity = '0';
            setTimeout(() => lb.style.display = 'none', 300);
        }
    </script>
</body>
</html>
