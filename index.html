<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كل شيء بالنسبة لي 💖</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; color: #333; background: linear-gradient(-45deg, #ffcce0, #ffe6f0, #ffb3d1, #ffd6e8); animation: gradientBG 15s ease infinite; overflow-x: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        .screen { display: none; opacity: 0; transition: opacity 0.6s ease; width: 100%; }
        .screen.active { display: flex; opacity: 1; }
        
        /* صندوق الدخول */
        .lock-box { background-color: #fff; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(255,105,180,0.3); max-width: 350px; width: 85%; }
        h2 { color: #ff1493; margin-bottom: 20px; }
        input[type="password"] { padding: 15px; margin: 15px 0; border: 2px solid #ffb6c1; border-radius: 10px; text-align: center; font-size: 18px; width: 80%; outline: none; }
        button { background-color: #ff1493; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
        button:hover { transform: scale(1.05); }
        
        /* الإشعار */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background-color: #fff; border-right: 5px solid #ff4d6d; padding: 15px 25px; border-radius: 8px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.15); transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; color: #ff4d6d; }
        #toast.show { top: 30px; }

        /* المحتوى الداخلي */
        .intro-text { background: rgba(255,255,255,0.85); padding: 30px; border-radius: 15px; max-width: 500px; line-height: 1.8; font-size: 18px; }
        #counter { margin: 20px 0; padding: 15px; background: rgba(255, 20, 147, 0.1); border-radius: 12px; color: #ff1493; font-weight: bold; direction: ltr; }
        .card { background: white; border-radius: 20px; padding: 15px; margin: 15px 0; width: 90%; max-width: 450px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,105,180,0.3); }
        .card img { width: 100%; border-radius: 15px; }
        .card p { font-weight: bold; color: #ff1493; margin-top: 10px; }
        
        /* التكبير */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="toast">⚠️ عذراً، الرمز غير صحيح!</div>

    <div id="loginScreen" class="container screen active">
        <div class="lock-box">
            <h2>بوابة ذكرياتنا</h2>
            <input type="password" id="passInput" placeholder="أدخل مفتاح القلب" onkeydown="if(event.key==='Enter') checkPass()">
            <br>
            <button onclick="checkPass()">دخول ✨</button>
        </div>
    </div>

    <div id="introScreen" class="container screen">
        <div class="intro-text">
            <h1 style="color: #ff1493;">إلى Ward 💖</h1>
            <div id="counter">نحن معاً منذ:<br><span id="time" style="color: #333;">...</span></div>
            <p id="typewriterText"></p>
            <button style="margin-top: 15px;" onclick="showCards()">تعالي لنرى أجمل أيامنا ✨</button>
        </div>
    </div>

    <div id="cardsScreen" class="container screen">
        <div class="card" onclick="openLightbox('https://i.postimg.cc/p9Ynn2qJ/1.jpg')"><img src="https://i.postimg.cc/p9Ynn2qJ/1.jpg"><p>من هنا بدأت حكايتنا 💖</p></div>
        <div class="card" onclick="openLightbox('https://i.postimg.cc/mcNFFb8j/2.jpg')"><img src="https://i.postimg.cc/mcNFFb8j/2.jpg"><p>لما عرفت إن الشعور متبادل 💕</p></div>
        <div class="card" onclick="openLightbox('https://i.postimg.cc/Vrf0q3hc/3.jpg')"><img src="https://i.postimg.cc/Vrf0q3hc/3.jpg"><p>أجمل حروف انكتبت لي 💖</p></div>
        <div class="card" onclick="openLightbox('https://i.postimg.cc/wyqRXSGN/4.jpg')"><img src="https://i.postimg.cc/wyqRXSGN/4.jpg"><p>وعودنا اللي مستحيل تنكسر ❤️</p></div>
        <div class="card" onclick="openLightbox('https://i.postimg.cc/xJ6Jt6rc/5.jpg')"><img src="https://i.postimg.cc/xJ6Jt6rc/5.jpg"><p>ضحكاتنا اللي تحلي أيامي 😂</p></div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.opacity='0'; setTimeout(()=>this.style.display='none',300)"><img id="lightboxImg" style="max-width:90%; max-height:80%; border-radius:10px;"></div>

    <script>
        const message = "إلى Ward، أنتِ كل شيء في حياتي. كل ثانية معكِ هي قصة حب أعيشها، وكل نبضة في قلبي تنادي باسمك. أحبكِ للأبد.";
        
        function checkPass() {
            if (document.getElementById("passInput").value === "20081017") {
                document.getElementById("loginScreen").classList.remove("active");
                document.getElementById("introScreen").classList.add("active");
                document.getElementById("introScreen").style.opacity = "1";
                startCounter(); typeWriter();
            } else {
                const t = document.getElementById("toast");
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 3000);
            }
        }
        
        let i = 0;
        function typeWriter() { 
            if(i < message.length) { 
                document.getElementById("typewriterText").innerHTML += message.charAt(i); 
                i++;
                setTimeout(typeWriter, 50); 
            } 
        }
        
        function startCounter() {
            setInterval(() => {
                const now = new Date();
                const start = new Date("2026-05-23T17:00:00");
                const diff = now - start;
                const d = Math.floor(diff / (1000*60*60*24));
                const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                const s = Math.floor((diff % (1000*60)) / 1000);
                document.getElementById("time").innerHTML = d+" يوم، "+h+" ساعة، "+m+" دقيقة، "+s+" ثانية";
            }, 1000);
        }
        
        function showCards() { 
            document.getElementById("introScreen").classList.remove("active"); 
            document.getElementById("cardsScreen").classList.add("active"); 
            document.getElementById("cardsScreen").style.opacity="1"; 
        }
        
        function openLightbox(src) { 
            const lb = document.getElementById('lightbox'); 
            document.getElementById('lightboxImg').src = src; 
            lb.style.display = 'flex'; 
            setTimeout(()=>lb.style.opacity='1', 10); 
        }
    </script>
</body>
</html>
